name: debt_free_app
description: A Flutter app for simulating debt repayment strategies and managing personal finances.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  fl_chart: ^0.68.0
  freezed_annotation: ^2.4.0
  json_serializable: ^6.0.0
  intl: ^0.19.0
  riverpod: ^2.0.0
  go_router: ^14.0.0
  drift: ^2.22.0
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.5.39
  firebase_core: ^4.7.0
  firebase_ai: ^3.11.0
  flutter_markdown: ^0.7.7
  http: ^1.6.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.22.0
  freezed: ^2.5.0
  json_serializable: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_new.png"
  adaptive_icon_background: "#0D1B2E"
  adaptive_icon_foreground: "assets/images/logo_new.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
